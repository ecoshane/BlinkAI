<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlinkAI 聊天室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827;
        }
        /* ... (您原有的所有 CSS 樣式) ... */
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-track { background: #1f2937; border-radius: 10px; }
        #chat-window::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        #chat-window::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .chat-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; word-wrap: break-word; line-height: 1.6; }
        .chat-bubble.user { background-color: #f472b6; color: #1f2937; font-weight: 500; border-bottom-right-radius: 4px; align-self: flex-end; }
        .chat-bubble.ai { background-color: #374151; color: #d1d5db; border-bottom-left-radius: 4px; align-self: flex-start; }
        .dot-flashing { position: relative; width: 6px; height: 6px; border-radius: 50%; background-color: #9ca3af; color: #9ca3af; animation: dotFlashing 1s infinite linear alternate; animation-delay: .5s; margin: 0 4px; }
        .dot-flashing::before, .dot-flashing::after { content: ''; display: inline-block; position: absolute; top: 0; }
        .dot-flashing::before { left: -10px; width: 6px; height: 6px; border-radius: 50%; background-color: #9ca3af; color: #9ca3af; animation: dotFlashing 1s infinite alternate; animation-delay: 0s; }
        .dot-flashing::after { left: 10px; width: 6px; height: 6px; border-radius: 50%; background-color: #9ca3af; color: #9ca3af; animation: dotFlashing 1s infinite alternate; animation-delay: 1s; }
        @keyframes dotFlashing { 0% { background-color: #9ca3af; } 50%, 100% { background-color: #6b7280; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-lg bg-gray-900 rounded-lg shadow-xl overflow-hidden" style="height: 700px; display: flex; flex-direction: column;">
        <!-- ... (您原有的 Header) ... -->
        <header class="bg-gray-900 text-white p-4 flex items-center space-x-3 border-b border-gray-700">
            <div class="w-12 h-12 rounded-full bg-pink-500 flex items-center justify-center text-xl font-bold text-gray-900"> B </div>
            <div>
                <h1 class="text-xl font-bold">BlinkAI</h1>
                <p class="text-sm text-gray-400">BLACKPINK 專屬助理</p>
            </div>
        </header>
        
        <!-- Chat Window -->
        <div id="chat-window" class="flex-1 p-6 space-y-4 overflow-y-auto bg-gray-800" style="scroll-behavior: smooth;">
            <!-- Initial AI Message -->
            <div class="flex">
                <div class="chat-bubble ai">
                    你好！我是 BlinkAI。
                    <br><br>
                    你可以問我關於 BLACKPINK 的問題，例如成員的角色擔當、出道日期或專輯名稱。
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="p-4 pl-6 bg-gray-800 hidden">
            <div class="flex items-center space-x-2">
                <div class="chat-bubble ai !p-3">
                    <div class="dot-flashing"></div>
                </div>
            </div>
        </div>

        <!-- ... (您原有的 Footer 和 Input Area) ... -->
        <footer class="border-t border-gray-700 p-4 bg-gray-900">
            <div class="flex space-x-3">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="例如：Jisoo 的角色擔當是？" 
                    class="flex-1 px-4 py-3 bg-gray-800 border border-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500"
                    autocomplete="off"
                >
                <button 
                    id="send-button"
                    class="px-5 py-3 bg-pink-500 text-gray-900 font-semibold rounded-lg hover:bg-pink-400 focus:outline-none focus:ring-2 focus:ring-pink-300 disabled:opacity-50"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                        <path d="M3.105 2.289a.75.75 0 00-.826.946l1.408 4.928A.75.75 0 004.42 8.5h4.862a.75.75 0 010 1.5H4.42a.75.75 0 00-.734.437l-1.408 4.928a.75.75 0 00.826.946l14.25-6.75a.75.75 0 000-1.418L3.105 2.289z" />
                    </svg>
                </button>
            </div>
            <p class="text-xs text-gray-500 text-center mt-3">
                BlinkAI 由 Gemini 驅動。知識範圍已受限於 BLACKPINK 核心事實。
            </p>
        </footer>
    </div>

    <script type="module">
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const typingIndicator = document.getElementById('typing-indicator');

        // RAG 核心 (systemPrompt) 已移至後端
        
        let chatHistory = [
            { role: "model", parts: [{ text: "你好！我是 BlinkAI。\n\n你可以問我關於 BLACKPINK 的問題，例如成員的角色擔當、出道日期或專輯名稱。" }] }
        ];

        // appendMessage 和 showTyping 函數保持不變...
        function appendMessage(sender, text) {
            const bubble = document.createElement('div');
            bubble.classList.add('chat-bubble', sender);
            bubble.innerHTML = text.replace(/\n/g, '<br>');

            const messageWrapper = document.createElement('div');
            messageWrapper.classList.add('flex');
            if (sender === 'user') {
                messageWrapper.classList.add('justify-end');
            }
            messageWrapper.appendChild(bubble);
            chatWindow.appendChild(messageWrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTyping(isLoading) {
            if (isLoading) {
                typingIndicator.classList.remove('hidden');
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } else {
                typingIndicator.classList.add('hidden');
            }
        }

        // --- 呼叫 API (已修改) ---
        async function callGemini(prompt) {
            sendButton.disabled = true;
            userInput.disabled = true;
            showTyping(true);

            // 將用戶訊息添加到歷史紀錄
            chatHistory.push({ role: "user", parts: [{ text: prompt }] });

            // **已修改：呼叫我們自己的後端 API 路由**
            const apiUrl = '/api/gemini'; 
            
            // 我們只需要發送聊天記錄
            const payload = {
                chatHistory: chatHistory
            };
            
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    // 處理來自後端的錯誤
                    const errData = await response.json();
                    throw new Error(errData.error || `伺服器錯誤: ${response.status}`);
                }

                const result = await response.json(); // { aiResponse: "..." } 或 { safetyMessage: "..." }

                if (result.aiResponse) {
                    // 成功
                    const aiResponse = result.aiResponse;
                    chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
                    appendMessage('ai', aiResponse);
                } else if (result.safetyMessage) {
                    // 處理安全阻擋
                    chatHistory.push({ role: "model", parts: [{ text: result.safetyMessage }] });
                    appendMessage('ai', result.safetyMessage);
                } else {
                    // 處理其他後端錯誤
                    const errorMessage = result.error || '抱歉，我無法處理這個請求。';
                    appendMessage('ai', errorMessage);
                }

            } catch (error) {
                console.error("Call 失敗:", error);
                const errorMessage = `發生錯誤: ${error.message}`;
                appendMessage('ai', errorMessage);
            } finally {
                sendButton.disabled = false;
                userInput.disabled = false;
                showTyping(false);
                userInput.focus();
            }
        }

        // --- 監聽事件 (保持不變) ---
        async function handleSend() {
            const prompt = userInput.value.trim();
            if (prompt) {
                appendMessage('user', prompt);
                userInput.value = '';
                await callGemini(prompt);
            }
        }

        sendButton.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault();
                handleSend();
            }
        });

    </script>
</body>
</html>
